trigger:
  branches:
    include:
      - main
  paths:
    include:
      - terraform/**

pool:
  vmImage: 'ubuntu-latest' # Using Microsoft-hosted agents for the demo bypass

variables:
  # This is the name of the Service Connection we will create in ADO
  azureServiceConnection: 'Banking-App-Azure-Connection'
  
  # Terraform Backend Settings (Where the state file lives)
  tf_backend_rg: 'terraform-state-rg'
  tf_backend_storage: 'tfstatebankingappdev' # Must be globally unique
  tf_backend_container: 'tfstate'
  tf_backend_key: 'dev.terraform.tfstate'
  
  # Which environment to deploy
  tf_environment: 'dev'

stages:
- stage: TerraformPlan
  displayName: 'Terraform Plan'
  jobs:
  - job: PlanJob
    displayName: 'Init and Plan'
    steps:
    - task: AzureCLI@2
      displayName: 'Run Terraform Init & Plan'
      inputs:
        azureSubscription: $(azureServiceConnection)
        addSpnToEnvironment: true
        scriptType: 'bash'
        scriptLocation: 'inlineScript'
        inlineScript: |
          # 1. Export Azure credentials so Terraform can authenticate natively
          export ARM_CLIENT_ID=$servicePrincipalId
          export ARM_CLIENT_SECRET=$servicePrincipalKey
          export ARM_TENANT_ID=$tenantId
          export ARM_SUBSCRIPTION_ID=$(az account show --query id -o tsv)

          cd terraform
          
          # 2. Initialize Terraform with the Remote Backend
          echo "Initializing Terraform..."
          terraform init \
            -backend-config="resource_group_name=$(tf_backend_rg)" \
            -backend-config="storage_account_name=$(tf_backend_storage)" \
            -backend-config="container_name=$(tf_backend_container)" \
            -backend-config="key=$(tf_backend_key)"

          # 3. Run the Plan and save the output to a file
          echo "Running Terraform Plan..."
          terraform plan -var-file="environments/$(tf_environment)/$(tf_environment).tfvars" -out=tfplan

- stage: TerraformApply
  displayName: 'Terraform Apply'
  dependsOn: TerraformPlan
  condition: succeeded()
  jobs:
  - job: ApplyJob
    displayName: 'Apply Infrastructure'
    steps:
    - task: AzureCLI@2
      displayName: 'Run Terraform Init & Apply'
      inputs:
        azureSubscription: $(azureServiceConnection)
        addSpnToEnvironment: true
        scriptType: 'bash'
        scriptLocation: 'inlineScript'
        inlineScript: |
          export ARM_CLIENT_ID=$servicePrincipalId
          export ARM_CLIENT_SECRET=$servicePrincipalKey
          export ARM_TENANT_ID=$tenantId
          export ARM_SUBSCRIPTION_ID=$(az account show --query id -o tsv)

          cd terraform
          
          terraform init \
            -backend-config="resource_group_name=$(tf_backend_rg)" \
            -backend-config="storage_account_name=$(tf_backend_storage)" \
            -backend-config="container_name=$(tf_backend_container)" \
            -backend-config="key=$(tf_backend_key)"

          echo "Applying Terraform Plan..."
          terraform apply -auto-approve -var-file="environments/$(tf_environment)/$(tf_environment).tfvars"