trigger: none 

pool:
  name: 'Default'

parameters:
  - name: environment
    displayName: 'Target Environment'
    type: string
    default: 'dev'
    values:
      - dev
      - qa
      - uat
      - prod
  - name: action
    displayName: 'Terraform Action'
    type: string
    default: 'plan'
    values:
      - plan
      - apply
      - destroy

variables:
  - name: azureServiceConnection
    value: 'Banking-App-Service-Connection'

stages:
- stage: TerraformPlan
  displayName: 'Init + Plan'
  jobs:
  - job: PlanJob
    displayName: 'Plan for ${{ parameters.environment }}'
    steps:
    - task: AzureCLI@2
      displayName: 'Execute Terraform Plan'
      inputs:
        azureSubscription: $(azureServiceConnection)
        scriptType: 'bash'
        scriptLocation: 'inlineScript'
        inlineScript: |
          cd infrastructure
          
          echo " STEP 1: INITIALIZING TERRAFORM FOR ${{ parameters.environment }}"
          terraform init -backend-config="environments/${{ parameters.environment }}/${{ parameters.environment }}-backend.conf" -reconfigure
          
          echo " STEP 2: RUNNING TERRAFORM PLAN"
          if [ "${{ parameters.action }}" == "destroy" ]; then
            terraform plan -destroy -var-file="environments/${{ parameters.environment }}/${{ parameters.environment }}.tfvars"
          else
            terraform plan -var-file="environments/${{ parameters.environment }}/${{ parameters.environment }}.tfvars"
          fi
 
- stage: TerraformExecute
  displayName: 'Execute ${{ parameters.action }}'
  dependsOn: TerraformPlan
  condition: and(succeeded(), ne('${{ parameters.action }}', 'plan'))
  jobs:
  - deployment: ExecuteJob
    displayName: 'Apply/Destroy for ${{ parameters.environment }}'
    environment: 'infra-${{ parameters.environment }}' 
    strategy:
      runOnce:
        deploy:
          steps:
          - checkout: self 
          - task: AzureCLI@2
            displayName: 'Execute Terraform ${{ parameters.action }}'
            inputs:
              azureSubscription: $(azureServiceConnection)
              scriptType: 'bash'
              scriptLocation: 'inlineScript'
              inlineScript: |
                cd infrastructure
                
                echo " RE-INITIALIZING TERRAFORM FOR ${{ parameters.environment }}"
                terraform init -backend-config="environments/${{ parameters.environment }}/${{ parameters.environment }}-backend.conf" -reconfigure
                
                echo " STEP 3: RUNNING TERRAFORM ${{ parameters.action }}"
                if [ "${{ parameters.action }}" == "apply" ]; then
                  
                  terraform apply -var-file="environments/${{ parameters.environment }}/${{ parameters.environment }}.tfvars" -auto-approve
                  
                elif [ "${{ parameters.action }}" == "destroy" ]; then
                  
                  terraform destroy -var-file="environments/${{ parameters.environment }}/${{ parameters.environment }}.tfvars" -auto-approve
                  
                fi