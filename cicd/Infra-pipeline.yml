trigger: none 

pool:
  name: 'Default' 

parameters:
  - name: action
    displayName: 'Terraform Action'
    type: string
    default: 'plan'
    values:
      - plan
      - apply
      - destroy

variables:
  - name: azureServiceConnection
    value: 'Banking-App-Service-Connection'

stages:

- stage: TerraformPlan
  displayName: 'Stage 1: Init & Plan'
  jobs:
  - job: PlanJob
    displayName: 'Plan Infrastructure'
    steps:
    - task: AzureCLI@2
      displayName: 'Execute Terraform Init & Plan'
      inputs:
        azureSubscription: $(azureServiceConnection)
        scriptType: 'bash'
        scriptLocation: 'inlineScript'
        inlineScript: |
          set -e 
          cd infrastructure
          
          echo " REQUESTED ACTION: ${{ parameters.action }}"
          
          echo "--- INITIALIZING TERRAFORM ---"
          terraform init -backend-config="environments/dev/dev-backend.conf" -reconfigure
          
          echo "--- RUNNING TERRAFORM PLAN ---"
          if [ "${{ parameters.action }}" == "destroy" ]; then
            terraform plan -destroy -var-file="environments/dev/dev.tfvars"
          else
            terraform plan -var-file="environments/dev/dev.tfvars"
          fi

- stage: TerraformExecute
  displayName: 'Stage 2: Execute ${{ parameters.action }}'
  dependsOn: TerraformPlan
  condition: and(succeeded(), ne('${{ parameters.action }}', 'plan'))
  jobs:
  - deployment: ExecuteJob
    displayName: 'Execute Action on Dev'
    environment: 'infra-dev' 
    strategy:
      runOnce:
        deploy:
          steps:
          - checkout: self 
          - task: AzureCLI@2
            displayName: 'Execute Terraform ${{ parameters.action }}'
            inputs:
              azureSubscription: $(azureServiceConnection)
              scriptType: 'bash'
              scriptLocation: 'inlineScript'
              inlineScript: |
                set -e 
                cd infrastructure
                
                echo "--- RE-INITIALIZING TERRAFORM (Required after fresh checkout) ---"
                terraform init -backend-config="environments/dev/dev-backend.conf"
                
                echo "--- EXECUTING APPROVED TERRAFORM ACTION ---"
                if [ "${{ parameters.action }}" == "apply" ]; then
                  terraform apply -var-file="environments/dev/dev.tfvars" -auto-approve
                  
                elif [ "${{ parameters.action }}" == "destroy" ]; then
                  terraform destroy -var-file="environments/dev/dev.tfvars" -auto-approve
                fi

- stage: BootstrapArgoCD
  displayName: 'Stage 3: ArgoCD'
  dependsOn: TerraformExecute
  condition: and(succeeded(), eq('${{ parameters.action }}', 'apply'))
  jobs:
  - job: InstallArgo
    steps:
    - task: AzureCLI@2
      displayName: 'Install ArgoCD, TLS, & Apply Ingress'
      inputs:
        azureSubscription: $(azureServiceConnection)
        scriptType: 'bash'
        scriptLocation: 'inlineScript'
        inlineScript: |
          set -e
          AKS_RG="Banking_Application_Dev"
          AKS_NAME="banking-app-aks-dev"
          DOMAIN="www.bankargocd.local"

          echo "--- 1. Installing Core ArgoCD ---"
          az aks command invoke \
            --resource-group $AKS_RG \
            --name $AKS_NAME \
            --command "kubectl create namespace argocd --dry-run=client -o yaml | kubectl apply -f - && kubectl apply -n argocd -f https://raw.githubusercontent.com/argoproj/argo-cd/stable/manifests/install.yaml --server-side=true --force-conflicts"
          
          echo "--- 2. Patching ArgoCD for SSL Offloading (HTTP mode) ---"
          az aks command invoke \
            --resource-group $AKS_RG \
            --name $AKS_NAME \
            --command "kubectl patch configmap argocd-cmd-params-cm -n argocd -p '{\"data\": {\"server.insecure\": \"true\"}}'"

          echo "--- 3. Generating and Injecting TLS Certificate ---"
          openssl req -x509 -nodes -days 365 -newkey rsa:2048 \
            -out argocd-tls.crt \
            -keyout argocd-tls.key \
            -subj "/CN=$DOMAIN/O=Global Bank"

          az aks command invoke \
            --resource-group $AKS_RG \
            --name $AKS_NAME \
            --command "kubectl create secret tls globalbank-tls-secret --key argocd-tls.key --cert argocd-tls.crt -n argocd --dry-run=client -o yaml | kubectl apply -f -" \
            --file argocd-tls.key \
            --file argocd-tls.crt

          echo "--- 4. Applying Ingress from Git ---"
          az aks command invoke \
            --resource-group $AKS_RG \
            --name $AKS_NAME \
            --command "kubectl apply -f ingress.yaml" \
            --file kube/argocd/ingress.yaml

          echo "--- 5. Rebooting Pods to Apply Changes ---"
          az aks command invoke \
            --resource-group $AKS_RG \
            --name $AKS_NAME \
            --command "kubectl rollout restart deployment argocd-server -n argocd"
            
          az aks command invoke \
            --resource-group $AKS_RG \
            --name $AKS_NAME \
            --command "kubectl delete pod -n kube-system -l app=ingress-appgw || true"

          echo "--- 6. Extracting Password ---"
          echo "Waiting 60 seconds for Argo to generate the secret..."
          sleep 60 
          
          set +e
          az aks command invoke \
            --resource-group $AKS_RG \
            --name $AKS_NAME \
            --command "kubectl -n argocd get secret argocd-initial-admin-secret -o jsonpath='{.data.password}' | base64 -d && echo" || echo "Secret not found. (If this is a re-run, you may have already changed the default password in the UI)."
          set -e

          echo "--- 7. Applying the GitOps ApplicationSet ---"
          az aks command invoke \
            --resource-group $AKS_RG \
            --name $AKS_NAME \
            --command "kubectl apply -f applicationset.yaml" \
            --file kube/argocd/applicationset.yaml
            
          echo "🚀 CLUSTER BOOTSTRAP COMPLETE!"
          echo "ArgoCD is now watching your repository for microservice tags."