trigger: none 

pool:
  name: 'Default'

parameters:
  - name: environment
    displayName: 'Target Environment'
    type: string
    default: 'dev'
    values:
      - dev
      - qa
      - uat
      - prod
  - name: action
    displayName: 'Terraform Action'
    type: string
    default: 'plan'
    values:
      - plan
      - apply
      - destroy

variables:
  azureServiceConnection: 'Banking-App-Service-Connection'

jobs:
- job: TerraformInfra
  displayName: 'Init + ${{ parameters.action }} for ${{ parameters.environment }}'
  steps:
  - task: AzureCLI@2
    displayName: 'Execute Terraform'
    inputs:
      azureSubscription: $(azureServiceConnection)
      scriptType: 'bash'
      scriptLocation: 'inlineScript'
      inlineScript: |
        cd infrastructure
        
        echo " STEP 1: INITIALIZING TERRAFORM FOR ${{ parameters.environment }}"
        terraform init -backend-config="environments/${{ parameters.environment }}/${{ parameters.environment }}-backend.conf" -reconfigure
        
        echo " STEP 2: RUNNING TERRAFORM ${{ parameters.action }}"
        
        if [ "${{ parameters.action }}" == "plan" ]; then
          
          terraform plan -var-file="environments/${{ parameters.environment }}/${{ parameters.environment }}.tfvars"
          
        elif [ "${{ parameters.action }}" == "apply" ]; then
          
          terraform apply -var-file="environments/${{ parameters.environment }}/${{ parameters.environment }}.tfvars" -auto-approve
          
        elif [ "${{ parameters.action }}" == "destroy" ]; then
          
          terraform destroy -var-file="environments/${{ parameters.environment }}/${{ parameters.environment }}.tfvars" -auto-approve
          
        fi