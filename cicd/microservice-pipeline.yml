trigger: none

pool:
  name: 'Default'

parameters:
  - name: serviceName
    displayName: 'Select Microservice to Deploy'
    type: string
    default: 'user-service'
    values:
      - user-service
      - account-service
      - transaction-service
      - notification-service
      - frontend-service

  - name: environment
    displayName: 'Target Environment'
    type: string
    default: 'dev'
    values:
      - dev
      - qa
      - uat
      - prod

variables:
  - name: azureServiceConnection
    value: 'Banking-App-Service-Connection' 
  - name: acrName
    value: 'bankingappregistrydev' 
  - name: sharedResourceGroup
    value: 'Banking_Application_Dev'
  - name: dbHost
    value: 'bankingdev-psqlflexibleserver.postgres.database.azure.com'
  - name: dbUser
    value: 'bankadmin'
  - name: serviceName
    value: ${{ parameters.serviceName }}

  - ${{ if eq(parameters.environment, 'dev') }}:
    - name: envSuffix
      value: 'dev'
    - name: acaEnvName
      value: 'banking-aca-env-dev'
    - name: dbName
      value: 'banking_db_dev'

  - ${{ if eq(parameters.environment, 'qa') }}:
    - name: envSuffix
      value: 'qa'
    - name: sourceEnvSuffix
      value: 'dev'
    - name: acaEnvName
      value: 'banking-aca-env-qa'
    - name: dbName
      value: 'banking_db_qa'

  - ${{ if eq(parameters.environment, 'uat') }}:
    - name: envSuffix
      value: 'uat'
    - name: sourceEnvSuffix
      value: 'qa'
    - name: acaEnvName
      value: 'banking-aca-env-uat'
    - name: dbName
      value: 'banking_db_uat'

  - ${{ if eq(parameters.environment, 'prod') }}:
    - name: envSuffix
      value: 'prod'
    - name: sourceEnvSuffix
      value: 'uat'
    - name: acaEnvName
      value: 'banking-aca-env-prod'
    - name: dbName
      value: 'banking_db_prod'

stages:
- stage: BuildAndDeploy
  displayName: 'Deploy ${{ parameters.serviceName }} to ${{ parameters.environment }}'
  jobs:
  - job: BuildPushDeploy
    steps:
    - bash: |
        SHORT_HASH=${BUILD_SOURCEVERSION:0:8}
        echo "Git Commit: $BUILD_SOURCEVERSION"
        echo "Short Hash: $SHORT_HASH"
        echo "##vso[task.setvariable variable=tag]$SHORT_HASH"
      displayName: 'Set Image Tag to Short Commit Hash'
      
    - task: AzureCLI@2
      displayName: 'Build/Promote, Push, and Deploy to ACA'
      inputs:
        azureSubscription: $(azureServiceConnection)
        scriptType: 'bash'
        scriptLocation: 'inlineScript'
        inlineScript: |
          set -e 
          
          UNIQUE_APP_NAME="$(serviceName)-$(envSuffix)"
          
          echo "======================================================="
          echo " DEPLOYING APP: $UNIQUE_APP_NAME"
          echo " TO ACA ENVIRONMENT: $(acaEnvName)"
          echo " IN RESOURCE GROUP: $(sharedResourceGroup)"
          echo "======================================================="
          
          echo "--- 1. Handling Image for $(envSuffix) ---"
          az acr login --name $(acrName)
          
          if [ "${{ parameters.environment }}" == "dev" ]; then
            echo "Building fresh image from source code..."
            cd src/$(serviceName)
            docker build -t $(acrName).azurecr.io/$(envSuffix)/$(serviceName):$(tag) .
            docker push $(acrName).azurecr.io/$(envSuffix)/$(serviceName):$(tag)
            cd ../../ 
          else
            echo "Promoting tested image from $(sourceEnvSuffix)..."
            az acr import \
              --name $(acrName) \
              --source $(acrName).azurecr.io/$(sourceEnvSuffix)/$(serviceName):$(tag) \
              --image $(envSuffix)/$(serviceName):$(tag) \
              --force
          fi
          
          echo "--- 2. Deploying to Azure Container Apps ---"
          
          INGRESS_TYPE="internal"
          TARGET_PORT=5000 
          
          if [ "$(serviceName)" == "frontend-service" ]; then
            echo "Frontend detected: Setting ingress to external."
            INGRESS_TYPE="external"
            TARGET_PORT=80 
          fi
          
          if az containerapp show --name $UNIQUE_APP_NAME --resource-group $(sharedResourceGroup) &> /dev/null; then
            echo "App $UNIQUE_APP_NAME exists. Updating revision..."
            az containerapp update \
              --name $UNIQUE_APP_NAME \
              --resource-group $(sharedResourceGroup) \
              --image $(acrName).azurecr.io/$(envSuffix)/$(serviceName):$(tag) \
              --set-secrets "db-password=$(dbPassword)" \
              --set-env-vars DB_HOST="$(dbHost)" DB_USER="$(dbUser)" DB_NAME="$(dbName)" DB_PASS="secretref:db-password"
          else
            echo "App $UNIQUE_APP_NAME does not exist. Creating it now..."
            az containerapp create \
              --name $UNIQUE_APP_NAME \
              --resource-group $(sharedResourceGroup) \
              --environment $(acaEnvName) \
              --image $(acrName).azurecr.io/$(envSuffix)/$(serviceName):$(tag) \
              --ingress $INGRESS_TYPE \
              --target-port $TARGET_PORT \
              --secrets "db-password=$(dbPassword)" \
              --env-vars DB_HOST="$(dbHost)" DB_USER="$(dbUser)" DB_NAME="$(dbName)" DB_PASS="secretref:db-password"
          fi

    - task: CmdLine@2
      displayName: 'Cleanup Local Disk Space'
      condition: always()
      inputs:
        script: |
          docker rmi $(acrName).azurecr.io/$(envSuffix)/$(serviceName):$(tag) || true
          if [ "$(sourceEnvSuffix)" != "" ]; then
            docker rmi $(acrName).azurecr.io/$(sourceEnvSuffix)/$(serviceName):$(tag) || true
          fi