trigger: none

pool:
  name: 'Default'

parameters:
  - name: serviceName
    displayName: 'Select Microservice to Deploy'
    type: string
    default: 'user-service'
    values:
      - user-service
      - account-service
      - transaction-service
      - notification-service
      - frontend-service

  - name: environment
    displayName: 'Target Environment'
    type: string
    default: 'dev'
    values:
      - dev
      - qa
      - uat
      - prod

variables:
  - name: azureServiceConnection
    value: 'Banking-App-Service-Connection' 
  - name: acrName
    value: 'bankingappregistrydev' 
  - name: dbHost
    value: 'bankingdev-psqlflexibleserver.postgres.database.azure.com'
  - name: dbUser
    value: 'bankadmin'
  - name: serviceName
    value: ${{ parameters.serviceName }}

  - ${{ if eq(parameters.environment, 'dev') }}:
    - name: envSuffix
      value: 'dev'
    - name: dbName
      value: 'banking_db_dev'

  - ${{ if eq(parameters.environment, 'qa') }}:
    - name: envSuffix
      value: 'qa'
    - name: sourceEnvSuffix
      value: 'dev'
    - name: dbName
      value: 'banking_db_qa'

  - ${{ if eq(parameters.environment, 'uat') }}:
    - name: envSuffix
      value: 'uat'
    - name: sourceEnvSuffix
      value: 'qa'
    - name: dbName
      value: 'banking_db_uat'

  - ${{ if eq(parameters.environment, 'prod') }}:
    - name: envSuffix
      value: 'prod'
    - name: sourceEnvSuffix
      value: 'uat'
    - name: dbName
      value: 'banking_db_prod'

  # Dynamically set the Resource Group based on the environment
  - name: targetResourceGroup
    value: 'Banking_Application_$(envSuffix)'

stages:
- stage: BuildAndDeploy
  displayName: 'Deploy ${{ parameters.serviceName }} to ${{ parameters.environment }}'
  jobs:
  - job: BuildPushDeploy
    steps:
    - bash: |
        SHORT_HASH=${BUILD_SOURCEVERSION:0:8}
        echo "Git Commit: $BUILD_SOURCEVERSION"
        echo "Short Hash: $SHORT_HASH"
        echo "##vso[task.setvariable variable=tag]$SHORT_HASH"
      displayName: 'Set Image Tag to Short Commit Hash'
      
    - task: AzureCLI@2
      displayName: 'Build/Promote, Push, and Deploy to ACA'
      inputs:
        azureSubscription: $(azureServiceConnection)
        scriptType: 'bash'
        scriptLocation: 'inlineScript'
        inlineScript: |
          set -e 
          
          echo "======================================================="
          echo " DEPLOYING: $(serviceName)"
          echo " TARGET ENVIRONMENT: $(envSuffix)"
          echo " TARGET RESOURCE GROUP: $(targetResourceGroup)"
          echo " SHARED ACR: $(acrName)"
          echo " DATABASE: $(dbName) on $(dbHost)"
          echo "======================================================="
          
          echo "--- 1. Handling Image for $(envSuffix) ---"
          az acr login --name $(acrName)
          
          if [ "${{ parameters.environment }}" == "dev" ]; then
            echo "Environment is DEV. Building a fresh image from source code..."
            cd src/$(serviceName)
            docker build -t $(acrName).azurecr.io/$(envSuffix)/$(serviceName):$(tag) .
            docker push $(acrName).azurecr.io/$(envSuffix)/$(serviceName):$(tag)
            cd ../../ 
          else
            echo "Environment is ${{ parameters.environment }}. Promoting tested image from $(sourceEnvSuffix)..."
            # Fast internal ACR promotion (Replaces slow pull/tag/push)
            az acr import \
              --name $(acrName) \
              --source $(acrName).azurecr.io/$(sourceEnvSuffix)/$(serviceName):$(tag) \
              --image $(envSuffix)/$(serviceName):$(tag) \
              --force
          fi
          
          echo "--- 2. Deploying to Azure Container Apps ---"
          
          # This single command replaces all the kubectl apply and sed replacement steps.
          # It pushes the new image, securely injects the password into the ACA vault, 
          # and maps the environment variables directly into the container.
          
          az containerapp update \
            --name $(serviceName) \
            --resource-group $(targetResourceGroup) \
            --image $(acrName).azurecr.io/$(envSuffix)/$(serviceName):$(tag) \
            --set-secrets "db-password=$(dbPassword)" \
            --set-env-vars \
                DB_HOST="$(dbHost)" \
                DB_USER="$(dbUser)" \
                DB_NAME="$(dbName)" \
                DB_PASS="secretref:db-password"
                
          echo "Deployment to ACA completed successfully!"

    - task: CmdLine@2
      displayName: 'Cleanup Local Disk Space'
      condition: always()
      inputs:
        script: |
          echo "Cleaning up local images to save agent disk space..."
          docker rmi $(acrName).azurecr.io/$(envSuffix)/$(serviceName):$(tag) || true
          if [ "$(sourceEnvSuffix)" != "" ]; then
            docker rmi $(acrName).azurecr.io/$(sourceEnvSuffix)/$(serviceName):$(tag) || true
          fi