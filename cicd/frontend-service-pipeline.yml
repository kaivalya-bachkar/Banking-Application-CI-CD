# Disable automatic triggers so a human has to click 'Run'
trigger: none 

pool:
  name: 'Default'

parameters:
  - name: environment
    displayName: 'Target Environment'
    type: string
    default: 'dev'
    values:
      - dev
      - qa
      - uat
      - prod

variables:
  - name: azureServiceConnection
    value: 'Banking-App-Service-Connection'
  - name: imageName
    value: 'frontend-service'
  - name: tag
    value: '$(Build.BuildId)'
  
  - ${{ if eq(parameters.environment, 'dev') }}:
    - name: acrName
      value: 'bankingAppRegistryDev'
    - name: aksResourceGroup
      value: 'Banking_Application_Dev'
    - name: aksName
      value: 'banking-app-aks-dev'
      
  - ${{ if eq(parameters.environment, 'qa') }}:
    - name: acrName
      value: 'bankingAppRegistryQA'
    - name: aksResourceGroup
      value: 'Banking_Application_QA'
    - name: aksName
      value: 'banking-app-aks-qa'

  - ${{ if eq(parameters.environment, 'uat') }}:
    - name: acrName
      value: 'bankingAppRegistryUAT'
    - name: aksResourceGroup
      value: 'Banking_Application_UAT'
    - name: aksName
      value: 'banking-app-aks-uat'

  - ${{ if eq(parameters.environment, 'prod') }}:
    - name: acrName
      value: 'bankingAppRegistryProd'
    - name: aksResourceGroup
      value: 'Banking_Application_Prod'
    - name: aksName
      value: 'banking-app-aks-prod'

stages:
- stage: BuildAndDeploy
  displayName: 'Deploy Frontend to ${{ parameters.environment }}'
  jobs:
  - job: BuildPushDeploy
    steps:
    - task: AzureCLI@2
      displayName: 'Build, Push, and Deploy'
      inputs:
        azureSubscription: $(azureServiceConnection)
        scriptType: 'bash'
        scriptLocation: 'inlineScript'
        inlineScript: |
           
          echo " TARGET ENVIRONMENT: ${{ parameters.environment }}"
          echo " ACR: $(acrName)"
          echo " AKS: $(aksName)"
          
          cd src/frontend-service
          
          echo "--- 1. Building Image for ${{ parameters.environment }} ---"
          az acr login --name $(acrName)
          docker build -t $(acrName).azurecr.io/$(imageName):$(tag) .
          docker push $(acrName).azurecr.io/$(imageName):$(tag)
          
          echo "--- 2. Injecting Variables into Manifest ---"
          cd ../../ 
          sed -i "s/__IMAGE_TAG__/$(tag)/g" kube/frontend-service.yaml
          sed -i "s|bankingAppRegistryDev.azurecr.io|$(acrName).azurecr.io|g" kube/frontend-service.yaml
          
          echo "--- 3. Deploying to $(aksName) ---"
          az aks get-credentials --resource-group $(aksResourceGroup) --name $(aksName) --overwrite-existing
          kubectl apply -f kube/frontend-service.yaml