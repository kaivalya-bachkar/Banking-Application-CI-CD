trigger: none 

pool:
  name: 'Default'

parameters:
  - name: environment
    displayName: 'Target Environment'
    type: string
    default: 'dev'
    values:
      - dev
      - qa
      - uat
      - prod

variables:
  - name: azureServiceConnection
    value: 'Banking-App-Service-Connection'
  - name: imageName
    value: 'frontend-service'
  
  - ${{ if eq(parameters.environment, 'dev') }}:
    - name: acrName
      value: 'bankingappregistrydev' 
    - name: sourceAcrName
      value: 'none' 
    - name: aksResourceGroup
      value: 'Banking_Application_Dev'
    - name: aksName
      value: 'banking-app-aks-dev'
      
  - ${{ if eq(parameters.environment, 'qa') }}:
    - name: acrName
      value: 'bankingappregistryqa'
    - name: sourceAcrName
      value: 'bankingappregistrydev'
    - name: aksResourceGroup
      value: 'Banking_Application_QA'
    - name: aksName
      value: 'banking-app-aks-qa'

  - ${{ if eq(parameters.environment, 'uat') }}:
    - name: acrName
      value: 'bankingappregistryuat'
    - name: sourceAcrName
      value: 'bankingappregistryqa' 
    - name: aksResourceGroup
      value: 'Banking_Application_UAT'
    - name: aksName
      value: 'banking-app-aks-uat'

  - ${{ if eq(parameters.environment, 'prod') }}:
    - name: acrName
      value: 'bankingappregistryprod'
    - name: sourceAcrName
      value: 'bankingappregistryuat' 
    - name: aksResourceGroup
      value: 'Banking_Application_Prod'
    - name: aksName
      value: 'banking-app-aks-prod'

stages:
- stage: BuildAndDeploy
  displayName: 'Deploy Frontend to ${{ parameters.environment }}'
  jobs:
  - job: BuildPushDeploy
    steps:
    - bash: |
        SHORT_HASH=${BUILD_SOURCEVERSION:0:8}
        echo "Git Commit: $BUILD_SOURCEVERSION"
        echo "Short Hash: $SHORT_HASH"
        echo "##vso[task.setvariable variable=tag]$SHORT_HASH"
      displayName: 'Set Image Tag to Short Commit Hash'
      
    - task: AzureCLI@2
      displayName: 'Build/Promote, Push, and Deploy'
      inputs:
        azureSubscription: $(azureServiceConnection)
        scriptType: 'bash'
        scriptLocation: 'inlineScript'
        inlineScript: |
          # SAFETY SWITCH: Stop the script immediately if any command fails!
          set -e 
          
          echo "======================================================="
          echo " TARGET ENVIRONMENT: ${{ parameters.environment }}"
          echo " TARGET ACR: $(acrName)"
          echo " SOURCE ACR: $(sourceAcrName)"
          echo " AKS: $(aksName)"
          echo "======================================================="
          
          cd src/frontend-service
          
          echo "--- 1. Handling Image for ${{ parameters.environment }} ---"
          if [ "${{ parameters.environment }}" == "dev" ]; then
            echo "Environment is DEV. Building a fresh image from source code..."
            az acr login --name $(acrName)
            docker build -t $(acrName).azurecr.io/$(imageName):$(tag) .
            docker push $(acrName).azurecr.io/$(imageName):$(tag)
          else
            echo "Environment is ${{ parameters.environment }}. Promoting tested image..."
            echo "Pulling image from $(sourceAcrName)..."
            az acr login --name $(sourceAcrName)
            docker pull $(sourceAcrName).azurecr.io/$(imageName):$(tag)
            
            echo "Retagging and pushing image to $(acrName)..."
            az acr login --name $(acrName)
            docker tag $(sourceAcrName).azurecr.io/$(imageName):$(tag) $(acrName).azurecr.io/$(imageName):$(tag)
            docker push $(acrName).azurecr.io/$(imageName):$(tag)
          fi
          
          echo "--- 2. Injecting Variables into Manifest ---"
          cd ../../ 
          sed -i "s/__IMAGE_TAG__/$(tag)/g" kube/frontend-service/frontend-deployment.yaml
          
          # We check for both camelCase and lowercase base templates just to be safe
          sed -i "s|bankingAppRegistryDev.azurecr.io|$(acrName).azurecr.io|g" kube/frontend-service/frontend-deployment.yaml
          sed -i "s|bankingappregistrydev.azurecr.io|$(acrName).azurecr.io|g" kube/frontend-service/frontend-deployment.yaml
          
          echo "--- 3. Deploying to $(aksName) via AKS Run Command ---"
          
          echo "Applying Deployment..."
          az aks command invoke \
            --resource-group $(aksResourceGroup) \
            --name $(aksName) \
            --command "kubectl apply -f frontend-deployment.yaml" \
            --file kube/frontend-service/frontend-deployment.yaml
            
          echo "Applying Service..."
          az aks command invoke \
            --resource-group $(aksResourceGroup) \
            --name $(aksName) \
            --command "kubectl apply -f frontend-service.yaml" \
            --file kube/frontend-service/frontend-service.yaml
            
          echo "Resetting AGIC Pod to fetch fresh Terraform IAM permissions..."
          az aks command invoke \
            --resource-group $(aksResourceGroup) \
            --name $(aksName) \
            --command "kubectl delete pod -n kube-system -l app=ingress-appgw"
            
          echo "Waiting 20 seconds for AGIC to reboot..."
          sleep 20
            
          echo "Applying Ingress..."
          az aks command invoke \
            --resource-group $(aksResourceGroup) \
            --name $(aksName) \
            --command "kubectl apply -f ingress.yaml" \
            --file kube/frontend-service/ingress.yaml