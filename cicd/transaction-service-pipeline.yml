trigger:
  branches:
    include:
      - main
  paths:
    include:
      - transaction-service/*

pool:
  name: 'Default'

parameters:
  - name: environment
    displayName: 'Target Environment'
    type: string
    default: 'dev'
    values:
      - dev
      - qa
      - uat
      - prod

variables:
  - name: azureServiceConnection
    value: 'Banking-App-Service-Connection' 
  - name: imageName
    value: 'transaction-service'
  - name: acrName
    value: 'bankingappregistrydev' 
  - name: aksResourceGroup
    value: 'Banking_Application_Dev'
  - name: aksName
    value: 'banking-app-aks-dev'
  - name: dbHost
    value: 'bankingdev-psqlflexibleserver.postgres.database.azure.com'

  - ${{ if eq(parameters.environment, 'dev') }}:
    - name: namespace
      value: 'dev'
    - name: dbName
      value: 'banking_db_dev'

  - ${{ if eq(parameters.environment, 'qa') }}:
    - name: namespace
      value: 'qa'
    - name: sourceNamespace
      value: 'dev'
    - name: dbName
      value: 'banking_db_qa'

  - ${{ if eq(parameters.environment, 'uat') }}:
    - name: namespace
      value: 'uat'
    - name: sourceNamespace
      value: 'qa'
    - name: dbName
      value: 'banking_db_uat'

  - ${{ if eq(parameters.environment, 'prod') }}:
    - name: namespace
      value: 'prod'
    - name: sourceNamespace
      value: 'uat'
    - name: dbName
      value: 'banking_db_prod'

stages:
- stage: BuildAndDeploy
  displayName: 'Deploy Transaction Service to ${{ parameters.environment }}'
  jobs:
  - job: BuildPushDeploy
    steps:
    - bash: |
        SHORT_HASH=${BUILD_SOURCEVERSION:0:8}
        echo "Git Commit: $BUILD_SOURCEVERSION"
        echo "Short Hash: $SHORT_HASH"
        echo "##vso[task.setvariable variable=tag]$SHORT_HASH"
      displayName: 'Set Image Tag to Short Commit Hash'
      
    - task: AzureCLI@2
      displayName: 'Build/Promote, Push, and Deploy'
      inputs:
        azureSubscription: $(azureServiceConnection)
        scriptType: 'bash'
        scriptLocation: 'inlineScript'
        inlineScript: |
          set -e 
          
          echo "======================================================="
          echo " TARGET NAMESPACE: $(namespace)"
          echo " SHARED ACR: $(acrName)"
          echo " SHARED AKS: $(aksName)"
          echo " TARGET DATABASE: $(dbName)"
          echo "======================================================="
          
          az aks command invoke \
            --resource-group $(aksResourceGroup) \
            --name $(aksName) \
            --command "kubectl create namespace $(namespace) --dry-run=client -o yaml | kubectl apply -f -"
          
          cd src/transaction-service
          
          az acr login --name $(acrName)
          
          if [ "${{ parameters.environment }}" == "dev" ]; then
            docker build -t $(acrName).azurecr.io/$(namespace)/$(imageName):$(tag) .
            docker push $(acrName).azurecr.io/$(namespace)/$(imageName):$(tag)
          else
            docker pull $(acrName).azurecr.io/$(sourceNamespace)/$(imageName):$(tag)
            docker tag $(acrName).azurecr.io/$(sourceNamespace)/$(imageName):$(tag) $(acrName).azurecr.io/$(namespace)/$(imageName):$(tag)
            docker push $(acrName).azurecr.io/$(namespace)/$(imageName):$(tag)
          fi
          
          cd ../../ 
          
          sed -i "s|__IMAGE__|$(acrName).azurecr.io/$(namespace)/$(imageName):$(tag)|g" kube/transaction-service/transaction-deployment.yaml
          sed -i "s|__DB_HOST__|$(dbHost)|g" kube/transaction-service/transaction-deployment.yaml
          sed -i "s|__DB_PASSWORD__|$(dbPassword)|g" kube/transaction-service/transaction-deployment.yaml
          sed -i "s|__DB_NAME__|$(dbName)|g" kube/transaction-service/transaction-deployment.yaml
          
          az aks command invoke \
            --resource-group $(aksResourceGroup) \
            --name $(aksName) \
            --command "kubectl apply -f transaction-deployment.yaml -n $(namespace)" \
            --file kube/transaction-service/transaction-deployment.yaml
            
          az aks command invoke \
            --resource-group $(aksResourceGroup) \
            --name $(aksName) \
            --command "kubectl apply -f transaction-service.yaml -n $(namespace)" \
            --file kube/transaction-service/transaction-service.yaml

    - task: CmdLine@2
      displayName: 'Cleanup Local Disk Space'
      condition: always()
      inputs:
        script: |
          docker rmi $(acrName).azurecr.io/$(namespace)/$(imageName):$(tag) || true
          if [ "$(sourceNamespace)" != "" ]; then
            docker rmi $(acrName).azurecr.io/$(sourceNamespace)/$(imageName):$(tag) || true
          fi